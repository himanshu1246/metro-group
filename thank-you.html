<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | King's Court</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background-color: var(--navy-bg);
            position: relative;
        }
        .thank-you-content {
            background: rgba(255, 255, 255, 0.03);
            padding: 4rem 2rem;
            border-radius: 12px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            max-width: 600px;
            width: 100%;
            margin-top: 60px;
        }
        .thank-you-icon {
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }
        .thank-you-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }
        .thank-you-text {
            color: var(--text-light);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header class="header scrolled">
        <div class="logo-container">
            <a href="index.html">
                <img src="assets/logo.png" alt="Metro Group Logo" class="brand-logo">
            </a>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn btn-outline btn-small">BACK TO HOME</a>
        </div>
    </header>

    <section class="thank-you-section">
        <div class="thank-you-content gs-reveal">
            <i class="ph ph-check-circle thank-you-icon"></i>
            <h1 class="thank-you-title">Thank You!</h1>
            <p class="thank-you-text">
                Your inquiry has been successfully submitted. Our team will review your details and get back to you shortly.
            </p>
            <a href="index.html" class="btn btn-primary">
                <i class="ph ph-arrow-left" style="margin-right: 0.5rem;"></i> RETURN TO WEBSITE
            </a>
        </div>
    </section>

    <!-- WHATSAPP FLOATING BUTTON -->

    <script>
        // Simple reveal animation
        if (typeof gsap !== 'undefined') {
            gsap.fromTo('.gs-reveal', 
                { autoAlpha: 0, y: 30 },
                { duration: 0.8, autoAlpha: 1, y: 0, ease: 'power3.out' }
            );
        }
    </script>
</body>
</html>
